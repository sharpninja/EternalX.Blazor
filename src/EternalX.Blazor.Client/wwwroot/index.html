<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EternalX</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css?v=2" />
    <meta name="theme-color" content="#000000" />
</head>

<body>
    <div id="app">
        <div class="boot">Eternal<span style="color:#1d9bf0">X</span> is waking the dead&hellip;</div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">&#128473;</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <style>
        /* Reserve room for the EternalSocial pinned footer; --es-footer-h is
           published by the gateway's injected footer and absent when the app
           is reached directly, so this collapses to zero. The frame and rail
           shrink by the footer height so the page never gains a dead scroll. */
        body { padding-bottom: var(--es-footer-h, 0rem); }
        .app-frame, .left-rail, .center-column { min-height: calc(100vh - var(--es-footer-h, 0rem)); }
    </style>
    <!--ETERNALSOCIAL-FOOTER-->
</body>

</html>
